{% extends "base.html" %}
{% block title %}Login – FoodRush{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🍔</div>
            <h1>Welcome Back!</h1>
            <p>Login to your FoodRush account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required
                    autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" name="password" placeholder="Your password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye"
                            id="pwIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-gradient btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="auth-divider"><span>Don't have an account?</span></div>
        <a href="{{ url_for('register') }}" class="btn-outline btn-block">
            <i class="fas fa-user-plus"></i> Create Account
        </a>
    </div>
</section>
<script>
    function togglePw() {
        const inp = document.getElementById('password');
        const icon = document.getElementById('pwIcon');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
    }
</script>
{% endblock %}
